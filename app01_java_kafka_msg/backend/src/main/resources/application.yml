spring:
  application:
    name: chat-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatdb}
    username: ${DB_USER:chat}
    # Dev-only default, matches deploy/docker-compose.yaml's Postgres service.
    # Any real deployment must override via DB_PASSWORD — never commit a
    # real credential here (SR-9's "no secrets in the repo" spirit).
    password: ${DB_PASSWORD:chat-dev-only}

  jpa:
    # Flyway (db/migration/) owns the schema; Hibernate only validates
    # entities against it — no auto-DDL.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    function:
      # Explicit, so a future Analytics & Education consumer function
      # doesn't get ambiguously auto-bound alongside this one.
      definition: chatRoomEventsConsumer
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
      bindings:
        # Producer side (ChatEventPublisher, PLAN_SSDLC.md §7.3).
        chat-room-events-out-0:
          destination: chat.room.events
          content-type: application/json
        # Consumer side (ChatEventConsumerConfig) — the "Consumer Group"
        # from the plan's educational Kafka-lifecycle narrative.
        chatRoomEventsConsumer-in-0:
          destination: chat.room.events
          group: chat-delivery-service
          content-type: application/json

# JWT signing (SR-2). Intentionally no default — a leaked/predictable
# signing secret lets anyone forge valid auth tokens, so unlike
# DB_PASSWORD above this must never have a value checked into the repo,
# not even a labeled "dev-only" one. For local dev, generate your own and
# export it before starting the app:
#   export JWT_SECRET=$(openssl rand -base64 48)
# The app fails fast at startup if this is unset (see
# identity.infrastructure's JWT config).
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
